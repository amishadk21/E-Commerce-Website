<html>
    <head>
        
    </head>
    <body>
        <form action="" method="post" onsubmit="login();return false">
            <input type="text" placeholder="Username" id="uname">
            <input type="password" placeholder="Password" id="upass">
            
         
            <button>Login</button>
        </form>
        <script>
        async function login() {
            const unameObj = document.getElementById("uname");
            const upassObj = document.getElementById("upass");
           

            const payload = {username: unameObj.value, password: upassObj.value}

            const apiurl = "http://localhost:3000/";

            console.log("Payload", payload);

            const response = await fetch(`${apiurl}auth/login`, {
                method: 'POST',
                body: JSON.stringify(payload),
                headers: {
                    'Content-Type': 'application/json'
                }
            });

            const responseData = await response.json();
            if(responseData.error==false){



            
            
             sessionStorage.setItem("token",responseData.token)
             if(responseData.data.role.toLowerCase()=="vendor"){
                location.href="./vendor_view.html"


             }
             else if(responseData.data.role.toLowerCase()=="customer"){
                location.href="./customer_view.html"

                
             }
            }

             

            alert(responseData.message);
        }
        </script>
    </body>
</html>
